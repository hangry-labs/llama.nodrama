name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  test:
    name: go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodrama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: nodrama/go.mod
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  cross-build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    defaults:
      run:
        working-directory: nodrama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: nodrama/go.mod
      - name: Build
        env:
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          version="$(cat VERSION)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ "${TARGET_GOOS}" = "windows" ]; then
            GOOS=linux GOARCH=amd64 go install github.com/tc-hib/go-winres@latest
            GOOS=linux GOARCH=amd64 go run ./tools/windowsres
            GOOS=linux GOARCH=amd64 go-winres make --arch "${TARGET_GOARCH}"
            strip_flags=""
          else
            strip_flags="-s -w"
          fi
          GOOS="${TARGET_GOOS}" GOARCH="${TARGET_GOARCH}" go build -trimpath \
            -ldflags "${strip_flags} -X main.version=${version} -X main.commit=${{ github.sha }} -X main.date=${build_date}" \
            -o dist/llama-nodrama-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: llama-nodrama-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nodrama/dist/*
