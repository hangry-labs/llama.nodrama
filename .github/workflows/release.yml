name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build release binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodrama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: nodrama/go.mod
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build archives
        env:
          CGO_ENABLED: "0"
          COMMIT: ${{ github.sha }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="$(cat VERSION)"
          test "$version" = "$TAG" || { echo "VERSION ($version) must match tag ($TAG)"; exit 1; }
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          build() {
            goos="$1"
            goarch="$2"
            ext="$3"
            name="llama-nodrama-${goos}-${goarch}"
            out="dist/${name}${ext}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "-s -w -X main.version=${version} -X main.commit=${COMMIT} -X main.date=${build_date}" \
              -o "$out" .
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q "${name}.zip" "${name}${ext}")
              rm "$out"
            else
              (cd dist && tar -czf "${name}.tar.gz" "${name}${ext}")
              rm "$out"
            fi
          }
          build linux amd64 ""
          build linux arm64 ""
          build darwin amd64 ""
          build darwin arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          rm -f dist/SHA256SUMS
          (cd dist && sha256sum llama-nodrama-* > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes --title "$TAG"
          fi
