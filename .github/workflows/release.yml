name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build release binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodrama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: nodrama/go.mod
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build archives
        env:
          CGO_ENABLED: "0"
          COMMIT: ${{ github.sha }}
          TAG: ${{ github.ref_name }}
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="$(cat VERSION)"
          test "$version" = "$TAG" || { echo "VERSION ($version) must match tag ($TAG)"; exit 1; }
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          build() {
            goos="$1"
            goarch="$2"
            ext="$3"
            name="llama-nodrama-${goos}-${goarch}"
            out="dist/${name}${ext}"
            if [ "$goos" = "windows" ]; then
              go run ./tools/windowsres
              go-winres make --arch amd64,arm64
              strip_flags=""
            else
              strip_flags="-s -w"
            fi
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "${strip_flags} -X main.version=${version} -X main.commit=${COMMIT} -X main.date=${build_date}" \
              -o "$out" .
            if [ "$goos" = "windows" ] && [ -n "${WINDOWS_CODESIGN_PFX_BASE64:-}" ]; then
              if ! command -v osslsigncode >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y osslsigncode
              fi
              cert_path="$(mktemp)"
              printf '%s' "$WINDOWS_CODESIGN_PFX_BASE64" | base64 -d > "$cert_path"
              osslsigncode sign \
                -pkcs12 "$cert_path" \
                -pass "$WINDOWS_CODESIGN_PASSWORD" \
                -n "llama.nodrama" \
                -i "https://github.com/hangry-labs/llama.nodrama" \
                -t "http://timestamp.digicert.com" \
                -in "$out" \
                -out "${out}.signed"
              rm -f "$cert_path"
              mv "${out}.signed" "$out"
            fi
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q "${name}.zip" "${name}${ext}")
              rm "$out"
            else
              (cd dist && tar -czf "${name}.tar.gz" "${name}${ext}")
              rm "$out"
            fi
          }
          build linux amd64 ""
          build linux arm64 ""
          build darwin amd64 ""
          build darwin arm64 ""
          go install github.com/tc-hib/go-winres@latest
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          rm -f dist/SHA256SUMS
          (cd dist && sha256sum llama-nodrama-* > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes --title "$TAG"
          fi
