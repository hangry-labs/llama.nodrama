name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build release binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodrama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: nodrama/go.mod
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build archives
        env:
          CGO_ENABLED: "0"
          COMMIT: ${{ github.sha }}
          TAG: ${{ github.ref_name }}
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="$(cat VERSION)"
          test "$version" = "$TAG" || { echo "VERSION ($version) must match tag ($TAG)"; exit 1; }
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          build() {
            goos="$1"
            goarch="$2"
            ext="$3"
            archive_name="llama-nodrama-${goos}-${goarch}"
            bin_name="llama-nodrama${ext}"
            work_dir="$(mktemp -d)"
            out="${work_dir}/${bin_name}"
            if [ "$goos" = "windows" ]; then
              GOOS=linux GOARCH=amd64 go run ./tools/windowsres
              GOOS=linux GOARCH=amd64 go-winres make --arch "$goarch"
              strip_flags=""
            else
              strip_flags="-s -w"
            fi
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "${strip_flags} -X main.version=${version} -X main.commit=${COMMIT} -X main.date=${build_date}" \
              -o "$out" .
            if [ "$goos" = "windows" ] && [ -n "${WINDOWS_CODESIGN_PFX_BASE64:-}" ]; then
              if ! command -v osslsigncode >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y osslsigncode
              fi
              cert_path="$(mktemp)"
              printf '%s' "$WINDOWS_CODESIGN_PFX_BASE64" | base64 -d > "$cert_path"
              osslsigncode sign \
                -pkcs12 "$cert_path" \
                -pass "$WINDOWS_CODESIGN_PASSWORD" \
                -n "llama.nodrama" \
                -i "https://github.com/hangry-labs/llama.nodrama" \
                -t "http://timestamp.digicert.com" \
                -in "$out" \
                -out "${out}.signed"
              rm -f "$cert_path"
              mv "${out}.signed" "$out"
            fi
            if [ "$goos" = "windows" ]; then
              (cd "$work_dir" && zip -q "${GITHUB_WORKSPACE}/nodrama/dist/${archive_name}.zip" "$bin_name")
            else
              (cd "$work_dir" && tar -czf "${GITHUB_WORKSPACE}/nodrama/dist/${archive_name}.tar.gz" "$bin_name")
            fi
            rm -rf "$work_dir"
          }
          build linux amd64 ""
          build linux arm64 ""
          build darwin amd64 ""
          build darwin arm64 ""
          GOOS=linux GOARCH=amd64 go install github.com/tc-hib/go-winres@latest
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          windows_amd64_hash="$(sha256sum dist/llama-nodrama-windows-amd64.zip | awk '{print $1}')"
          windows_arm64_hash="$(sha256sum dist/llama-nodrama-windows-arm64.zip | awk '{print $1}')"
          winget_version="${version#v}"
          winget_dir="dist/winget"
          mkdir -p "$winget_dir"
          cat > "${winget_dir}/HangryLabs.LlamaNodrama.yaml" <<EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.version.1.10.0.schema.json
          PackageIdentifier: HangryLabs.LlamaNodrama
          PackageVersion: ${winget_version}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.10.0
          EOF
          cat > "${winget_dir}/HangryLabs.LlamaNodrama.installer.yaml" <<EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.installer.1.10.0.schema.json
          PackageIdentifier: HangryLabs.LlamaNodrama
          PackageVersion: ${winget_version}
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
            - RelativeFilePath: llama-nodrama.exe
              PortableCommandAlias: llama-nodrama
          Commands:
            - llama-nodrama
          Installers:
            - Architecture: x64
              InstallerUrl: https://github.com/hangry-labs/llama.nodrama/releases/download/${version}/llama-nodrama-windows-amd64.zip
              InstallerSha256: ${windows_amd64_hash}
            - Architecture: arm64
              InstallerUrl: https://github.com/hangry-labs/llama.nodrama/releases/download/${version}/llama-nodrama-windows-arm64.zip
              InstallerSha256: ${windows_arm64_hash}
          ManifestType: installer
          ManifestVersion: 1.10.0
          EOF
          cat > "${winget_dir}/HangryLabs.LlamaNodrama.locale.en-US.yaml" <<EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.defaultLocale.1.10.0.schema.json
          PackageIdentifier: HangryLabs.LlamaNodrama
          PackageVersion: ${winget_version}
          PackageLocale: en-US
          Publisher: Hangry Labs
          PublisherUrl: https://github.com/hangry-labs
          PublisherSupportUrl: https://github.com/hangry-labs/llama.nodrama/issues
          Author: Hangry Labs
          PackageName: llama.nodrama
          PackageUrl: https://github.com/hangry-labs/llama.nodrama
          License: MIT
          LicenseUrl: https://github.com/hangry-labs/llama.nodrama/blob/master/LICENSE
          ShortDescription: Dashboard and monitor for llama.cpp server slots, throughput, cache reuse, and request behavior.
          Moniker: llama-nodrama
          Tags:
            - llama.cpp
            - llm
            - ai
            - dashboard
            - monitor
          ManifestType: defaultLocale
          ManifestVersion: 1.10.0
          EOF
          (cd dist && zip -qr HangryLabs.LlamaNodrama.winget.zip winget)
          rm -rf "$winget_dir"
          rm -f dist/SHA256SUMS
          (cd dist && sha256sum HangryLabs.LlamaNodrama.winget.zip llama-nodrama-* > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes --title "$TAG"
          fi
