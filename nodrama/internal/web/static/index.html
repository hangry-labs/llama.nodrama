<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>llama.nodrama</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="shortcut icon" type="image/png" href="/favicon.ico">
<link rel="stylesheet" href="/static/css/00-base-layout.css">
<link rel="stylesheet" href="/static/css/10-metrics.css">
<link rel="stylesheet" href="/static/css/15-cache.css">
<link rel="stylesheet" href="/static/css/20-slots-queries.css">
<link rel="stylesheet" href="/static/css/30-models-config.css">
<link rel="stylesheet" href="/static/css/40-modals-settings.css">
<link rel="stylesheet" href="/static/css/50-logs-guidance-footer.css">
<link rel="stylesheet" href="/static/css/60-chat.css">
</head>
<body>

<header class="app">
  <span class="brand">llama<span class="dot">·</span>nodrama</span>
  <span id="status-led" class="led" aria-hidden="true"></span>
  <span id="status-text" class="status-pill" role="status" aria-live="polite" data-i18n="header.status.connecting">…</span>
  <span id="last-update" class="last-update" aria-live="polite"></span>
  <span class="grow"></span>
  <a id="version-display" class="version-display" href="https://github.com/hangry-labs/llama.nodrama" target="_blank" rel="noopener noreferrer" title=""></a>
  <span id="server-display" class="server" title=""></span>
  <button id="api-docs-button" class="api-docs-button" title="APIs" aria-label="APIs">APIs</button>
  <button id="settings-button" title="Settings" aria-label="Settings">⚙</button>
  <select id="lang-select" aria-label="Language" title="Language">
    <option value="en">EN</option>
    <option value="ko">한국어</option>
    <option value="ja">日本語</option>
    <option value="zh-CN">中文</option>
    <option value="es">Español</option>
  </select>
</header>

<div id="banners"></div>

<main id="root">
  <div class="empty-hint" data-i18n="boot.preparing">Preparing…</div>
</main>

<footer class="app">
  <span data-i18n="footer.attribution">llama.nodrama dashboard</span>
</footer>

<script src="/static/i18n/00-core.js"></script>
<script src="/static/i18n/en.js"></script>
<script src="/static/i18n/ko.js"></script>
<script src="/static/i18n/ja.js"></script>
<script src="/static/i18n/zh-CN.js"></script>
<script src="/static/i18n/es.js"></script>
<!-- Core order matters: foundation -> network/demo -> snapshot -> polling. -->
<script src="/static/app/core/00-foundation.js"></script>
<script src="/static/app/core/10-network-demo.js"></script>
<script src="/static/app/core/20-snapshot.js"></script>
<script src="/static/app/core/30-polling.js"></script>

<!-- Shell order matters: boot/scaffold first, user actions before guidance. -->
<script src="/static/app/shell/00-boot.js"></script>
<script src="/static/app/shell/10-models.js"></script>
<script src="/static/app/shell/20-config-options.js"></script>
<script src="/static/app/shell/30-config-panels.js"></script>
<script src="/static/app/shell/40-modal-settings.js"></script>
<script src="/static/app/shell/45-api-docs.js"></script>
<script src="/static/app/shell/50-actions.js"></script>
<script src="/static/app/shell/60-guidance.js"></script>

<script src="/static/app/20-logs.js"></script>
<script src="/static/app/history/00-points.js"></script>
<script src="/static/app/history/10-sparkline.js"></script>
<script src="/static/app/metrics/00-catalog-format.js"></script>
<script src="/static/app/metrics/10-render.js"></script>
<script src="/static/app/cache/00-render.js"></script>
<script src="/static/app/40-slots-queries.js"></script>
<script src="/static/app/chat/00-state.js"></script>
<script src="/static/app/chat/10-markdown.js"></script>
<script src="/static/app/chat/20-render.js"></script>
<script src="/static/app/chat/30-stream.js"></script>
<script src="/static/app/99-start.js"></script>
</body>
</html>
